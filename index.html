<!DOCTYPE html>
<html>
<head>
    <title>Samsam</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1e1e2f, #3a3a5a);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        .card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(10px);
            padding: 60px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            max-width: 500px;
        }

        h1 {
            font-size: 48px;
            margin-bottom: 10px;
            letter-spacing: 2px;
        }

        p {
            opacity: 0.8;
            font-size: 18px;
        }

        button {
            margin-top: 30px;
            padding: 12px 30px;
            border: none;
            border-radius: 30px;
            background: white;
            color: black;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>SAMSAM</h1>
        <p>creating something cool on the internet ✨</p>
        <button onclick="alert('Bienvenida a mi espacio aesthetic 💫')">
            enter
        </button>
    </div>

</body>
</html>
